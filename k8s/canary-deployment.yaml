apiVersion: v1
kind: Service
metadata:
  name: hostamar-stable
  namespace: prod
  labels:
    app: hostamar
    track: stable
spec:
  selector:
    app: hostamar
    track: stable
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: hostamar-canary
  namespace: prod
  labels:
    app: hostamar
    track: canary
spec:
  selector:
    app: hostamar
    track: canary
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hostamar-stable
  namespace: prod
  labels:
    app: hostamar
    track: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hostamar
      track: stable
  template:
    metadata:
      labels:
        app: hostamar
        track: stable
    spec:
      containers:
        - name: hostamar
          image: registry.example.com/hostamar:stable
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hostamar-secrets
                  key: database-url
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: hostamar-secrets
                  key: nextauth-secret
            - name: NEXTAUTH_URL
              value: "https://hostamar.com"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hostamar-canary
  namespace: prod
  labels:
    app: hostamar
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hostamar
      track: canary
  template:
    metadata:
      labels:
        app: hostamar
        track: canary
    spec:
      containers:
        - name: hostamar
          image: registry.example.com/hostamar:canary-${GIT_SHA}
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: CANARY
              value: "true"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hostamar-secrets
                  key: database-url
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: hostamar-secrets
                  key: nextauth-secret
            - name: NEXTAUTH_URL
              value: "https://hostamar.com"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
