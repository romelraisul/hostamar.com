# Cloudflare Tunnel config — Redis bridge
#
# This is added to /etc/cloudflared/config.yml after creating a tunnel
# identity called "hostamar-redis-bridge" in the Cloudflare dashboard.
#
# Status: NOT YET APPLIED — needs CF API token + tunnel creation step.
# Don't paste secrets here. The credentials live in
# ~/.cloudflared/<TUNNEL_ID>.json (mode 600).

# Tunnel identity:
#   cloudflared tunnel create hostamar-redis-bridge
#   → produces ~/.cloudflared/<id>.json (the secret)
#   → yields <id>.cfargotunnel.com public hostname (no DNS record yet)
#
# DNS record (added next):
#   cloudflared tunnel route dns hostamar-redis-bridge redis.hostamar.com
#   → CNAME redis.hostamar.com → <id>.cfargotunnel.com
#
# Until both steps run, this ingress block is dead. The below is the
# ingress-rule shape that the running cloudflared process will load
# once the credentials file is in place.

ingress:
  - hostname: redis.hostamar.com
    path: /.*
    service: http://hostamar-redis-bridge:6380
    originRequest:
      noTLSVerify: true
      # Cloudflare-native websockets (we use ws://, not wss://, on the origin side;
      # CF terminates TLS and upgrades to WS at the edge automatically).
      keepAliveConnections: 4
      keepAliveTimeout: 90s
  # Catch-all 404 (mandatory per CF tunnel docs)
  - service: http_status:404
