services:
  postgres:
    image: postgres:16-alpine
    container_name: hostamar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hostamar
      POSTGRES_PASSWORD: hostamar
      POSTGRES_DB: hostamar
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostamar"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - hostamar-network

  redis:
    image: redis:7-alpine
    container_name: hostamar-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hostamar-network

  redis-bridge:
    build: ./redis-bridge
    container_name: hostamar-redis-bridge
    restart: unless-stopped
    networks:
      - hostamar-network
    environment:
      - BRIDGE_PORT=6380
      - REDIS_HOST=hostamar-redis
      - REDIS_PORT=6379
      - BRIDGE_BEARER=${REDIS_BRIDGE_BEARER:-}
    depends_on:
      redis:
        condition: service_healthy

  model-server:
    build: ./model-server
    image: hostamar-model:local
    container_name: hostamar-model
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - hostamar-network
    environment:
      - OLLAMA_HOST=http://hostamar-ollama:11434
      - OLLAMA_MODEL=hostamar:latest
      - OLLAMA_TIMEOUT=1800
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: hostamar-ollama
    restart: unless-stopped
    runtime: nvidia
    networks:
      - hostamar-network
    volumes:
      - flociops-assistant_ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'timeout 2 bash -c \"cat < /dev/null > /dev/tcp/localhost/11434\"'"]
      interval: 30s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: hostamar-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - hostamar-network
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 3

  hostamar:
    image: hostamar-app:latest
    container_name: hostamar-app
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=postgresql://hostamar:hostamar@postgres:5432/hostamar
      - REDIS_URL=redis://redis:6379
      - R2_ENDPOINT=http://hostamar-minio:9000
      - R2_ACCESS_KEY=minioadmin
      - R2_SECRET_KEY=minioadmin
      - R2_BUCKET=hostamar-videos
      - R2_PUBLIC_URL=http://hostamar-minio:9000/hostamar-videos
      - OLLAMA_HOST=http://hostamar-model:8000
      - OLLAMA_MODEL=hostamar:latest
      - KILOCODE_BASE_URL=https://api.kilo.ai/api/gateway
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - hostamar-network

  nginx-proxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: hostamar-nginx:local
    container_name: hostamar-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - nginx-cache:/var/cache/nginx
    depends_on:
      - hostamar
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/__nginx_health | grep -q OK || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hostamar-network

  hostamar-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hostamar-cloudflared
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - cloudflared-config:/etc/cloudflared
    restart: unless-stopped
    networks:
      - hostamar-network
    depends_on:
      nginx-proxy:
        condition: service_started

  mailpit:
    image: axllent/mailpit:latest
    container_name: hostamar-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "11125:11125"
    volumes:
      - mailpit-data:/data
    networks:
      - hostamar-network
    environment:
      - MP_SMTP_AUTH=optional
      - MP_MAX_MESSAGES=1000
      - MP_DATA_DIR=/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  ollama-data:
    external: true
    name: flociops-assistant_ollama-data
  minio-data:
    driver: local
  hostamar-data:
    driver: local
  hostamar-prisma:
    driver: local
  mailpit-data:
    driver: local
  cloudflared-config:
    external: true
    name: cloudflared-config
  nginx-cache:
    driver: local

networks:
  hostamar-network:
    external: true
    name: hostamar-network