version: "3.8"

services:
  app:
    image: ghcr.io/romelraisul/hostamar-app:${TAG:-latest}
    env_file: .env
    environment:
      # Defense-in-depth: pin NEXTAUTH values from env explicitly so that
      # an accidentally-stale .env cannot resurrect the
      # NEXTAUTH_URL=localhost bug. These take precedence over env_file.
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    restart: unless-stopped
    logging:
      options:
        max-size: "50m"
        max-file: "5"

  hostamar-gpu-worker:
    image: ghcr.io/romelraisul/hostamar-gpu-worker:${TAG:-latest}
    env_file: .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "6G"

  nginx:
    image: nginx:stable
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER:-hostamar}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-hostamar}
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hostamar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
