version: '3.8'

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - /home/romel/.cloudflared/tunnel-config/credentials.json:/credentials.json:ro
      - /home/romel/.cloudflared/tunnel-config/config.yml:/etc/cloudflared/config.yml:ro
    networks:
      - default_hostamar-network

networks:
  default_hostamar-network:
    external: true
