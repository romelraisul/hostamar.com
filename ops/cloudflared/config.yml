# cloudflared config for hostamar
# Place this file at /etc/cloudflared/config.yml when deploying the tunnel container/service.

tunnel: 19c220ee-37ae-4fad-9c99-495f0e154b12
credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: hostamar.com
    service: http://hostamar-app:3000
  - hostname: www.hostamar.com
    service: http://hostamar-app:3000
  - hostname: ai.hostamar.com
    service: http://hostamar-app:3000
  - hostname: admin.hostamar.com
    service: http://hostamar-app:3000
  - hostname: staging.hostamar.com
    service: http://hostamar-app:3000
  - hostname: staging-www.hostamar.com
    service: http://hostamar-app:3000
  - hostname: api.hostamar.com
    service: http://hostamar-app:3000
  - service: http_status:404

originRequest:
  connectTimeout: 30s
  noTLSVerify: false

# Notes:
# - Ensure the credentials-file path matches the mounted file inside the container.
# - The service target must match the service name in your compose/network (hostamar-app:3000).
# - Do not commit real credentials to git.
