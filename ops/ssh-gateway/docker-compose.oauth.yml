services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    restart: unless-stopped
    depends_on:
      - ssh-gateway
    ports:
      - "127.0.0.1:4180:4180"
    env_file:
      - /home/romel/ceo-secrets/oauth2-proxy.env
    networks:
      - ssh-gateway

  ssh-gateway:
    image: tsl0922/ttyd:latest
    restart: unless-stopped
    command: ["ttyd", "-p", "7681", "bash"]
    expose:
      - "7681"
    read_only: true
    tmpfs:
      - /tmp
    user: "1000:1000"
    networks:
      - ssh-gateway
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/7681'"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  ssh-gateway:
    external: true
    name: default_hostamar-network
