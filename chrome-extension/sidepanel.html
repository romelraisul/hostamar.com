<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hostamar AI সারাংশ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      padding: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
    }
    .header p {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 2px;
    }
    .content {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .summary { font-size: 14px; line-height: 1.7; color: #374151; }
    .summary h4 { font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
    .summary ul { list-style: none; padding: 0; }
    .summary li {
      padding: 3px 0 3px 14px;
      position: relative;
      font-size: 13px;
      color: #4b5563;
    }
    .summary li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: #3b82f6;
    }
    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      border-top: 1px solid #f3f4f6;
    }
    .footer a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🇧🇩 Hostamar AI সারাংশ</h1>
    <p id="page-title">লোড হচ্ছে...</p>
  </div>
  <div class="content" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>পৃষ্ঠা পড়া হচ্ছে...</p>
    </div>
  </div>
  <div class="footer">
    Powered by <a href="https://hostamar.com" target="_blank">hostamar.com</a>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
