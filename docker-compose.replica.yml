services:
  postgres-replica:
    image: postgres:16-alpine
    container_name: hostamar-postgres-replica
    restart: unless-stopped
    environment:
      POSTGRES_USER: hostamar
      POSTGRES_PASSWORD: hostamar
      POSTGRES_DB: hostamar
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
      -c wal_receiver_status_interval=10s
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
    networks:
      - hostamar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostamar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer for replica read replicas
  pgbouncer-replica:
    image: edoburu/pgbouncer:latest
    container_name: hostamar-pgbouncer-replica
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://hostamar:hostamar@postgres-replica:5432/hostamar
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 5
      USERLIST: /etc/pgbouncer/userlist.txt
    volumes:
      - ./userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6433:6432"
    networks:
      - hostamar-network
    depends_on:
      postgres-replica:
        condition: service_healthy

volumes:
  postgres-replica-data:
    driver: local

networks:
  hostamar-network:
    external: true
    name: hostamar-network