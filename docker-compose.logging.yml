version: '3.8'

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: hostamar-loki
    ports:
      - "3100:3100"
    volumes:
      - ./logging/loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  promtail:
    image: grafana/promtail:3.0.0
    container_name: hostamar-promtail
    volumes:
      - ./logging/promtail-config.yaml:/etc/promtail/config.yaml
      - ../logs:/var/log/hostamar:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - logging
    restart: unless-stopped
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.0.0
    container_name: hostamar-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=hostamar
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./logging/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    networks:
      - logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  logging:
    driver: bridge

volumes:
  loki-data:
  grafana-data:
