# PostgreSQL Replica Configuration
# Primary connection settings
listen_addresses = '*'
port = 5432
max_connections = 100

# Replication settings
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on
hot_standby_feedback = on

# WAL settings
wal_keep_segments = 64
wal_sender_timeout = 60s
wal_receiver_timeout = 60s
max_standby_streaming_delay = 30s
max_standby_archive_delay = 30s

# Archive settings
archive_mode = on
archive_command = 'cp %p /var/lib/postgresql/archive/%f'
archive_timeout = 60s

# Logging
log_destination = 'stderr'
logging_collector = off
log_statement = 'all'
log_min_duration_statement = 1000

# Memory
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 64MB
work_mem = 4MB

# Checkpoint
checkpoint_completion_target = 0.9
wal_buffers = 16MB
min_wal_size = 1GB
max_wal_size = 4GB

# Replica specific
primary_conninfo = 'host=hostamar-postgres port=5432 user=replicator password=replicator_pass application_name=hostamar-replica'
primary_slot_name = 'hostamar_replica_slot'
promote_trigger_file = '/tmp/promote_replica'
