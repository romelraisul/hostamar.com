events {
    worker_connections 1024;
}

http {
    include /etc/nginx/conf.d/default.conf;

    # Proxy cache paths
    proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=STATIC:10m max_size=500m use_temp_path=off inactive=7d;
    proxy_cache_path /var/cache/nginx/ai levels=1:2 keys_zone=AI:50m max_size=1g use_temp_path=off inactive=1h;

    # Logging — keep errors only
    log_format main '$remote_addr - $request_method $uri $status';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Timeouts
    client_body_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 30s;

    # Buffer sizes
    client_body_buffer_size 128k;
    proxy_buffer_size 128k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 192k;

    # Gzip
    gzip on;
    gzip_types text/plain application/javascript application/json text/css image/svg+xml;
    gzip_min_length 512;
}