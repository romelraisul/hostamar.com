upstream hostamar_app {
    server hostamar:3000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    # Health check endpoint for nginx itself
    location /__nginx_health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Static assets — aggressive cache (immutable from Next.js)
    location /_next/static/ {
        proxy_pass http://hostamar_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache STATIC;
        proxy_cache_valid 200 31536000s;
        proxy_cache_valid 404 1m;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Public static files
    location /static/ {
        proxy_pass http://hostamar_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache STATIC;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Auth routes — strict rate limiting
    location ~ ^/api/auth {
        proxy_pass http://hostamar_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        limit_req zone=auth burst=5 nodelay;
    }

    # API routes
    location /api/ {
        proxy_pass http://hostamar_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=api burst=30 nodelay;
        # Long timeout for AI model calls
        proxy_read_timeout 1800s;
        proxy_connect_timeout 60s;
    }

    # WebSocket support
    location /ws {
        proxy_pass http://hostamar_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Everything else
    location / {
        proxy_pass http://hostamar_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Connection "";
    }
}