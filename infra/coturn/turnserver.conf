# Coturn TURN server — critical for Bangladesh mobile NAT (Grameenphone/Robi
# CGNAT breaks P2P/WebRTC). Mounted into the coturn container at
# /etc/coturn/turnserver.conf.
#
# This file is RENDERED at deploy time by scripts/render-turn-conf.sh from
# .env (TURN_STATIC_AUTH_SECRET, VPS_PUBLIC_IP, LIVEKIT_TURN_DOMAIN). The
# container reads the rendered file; do not hand-edit after render.
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0
# PUBLIC_IP from env, PRIVATE_IP auto-detected inside the render script.
external-ip=${PUBLIC_IP}/$(hostname -I | awk '{print $1}')
realm=${TURN_DOMAIN}
server-name=${TURN_DOMAIN}
# Static auth secret — recommended for WebRTC/LiveKit TURN credentials.
static-auth-secret=${TURN_STATIC_AUTH_SECRET}
# TLS once certs are provisioned (cert rotation: scripts/rotate-turn-cert.sh).
cert=/certs/fullchain.pem
pkey=/certs/privkey.pem
no-stdout-log
syslog
no-tcp-relay
no-multicast-peers
min-port=49160
max-port=49200
verbose
