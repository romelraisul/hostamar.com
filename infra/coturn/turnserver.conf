# Coturn TURN server — critical for Bangladesh mobile NAT (Grameenphone/Robi
# CGNAT breaks P2P/WebRTC). Mounted into the coturn container at
# /etc/coturn/turnserver.conf. Fill VPS_PUBLIC_IP before starting.
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0
external-ip=<YOUR_VPS_PUBLIC_IP>   # set via: export VPS_PUBLIC_IP=$(curl -s ifconfig.me)
realm=hostamar.com
server-name=turn.hostamar.com
lt-cred-mech
user=hostamar:<generate-random-16-char-or-set-COTURN_PASSWORD>
# Optional: enable TLS once certs are provisioned
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem
no-stdout-log
log-file=/var/log/coturn.log
