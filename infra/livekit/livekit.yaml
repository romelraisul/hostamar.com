# LiveKit SFU config — single-node $0 deployment.
# Mounted read-only into the livekit container at /etc/livekit.yaml.
port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: true
  # Public IP auto-detected via LIVEKIT_NODE_IP env when behind NAT.
  tcp_port: 7881
  # Per-session UDP media ports (small range; the 50000 range above is for TURN relay).
  port_range_start: 7882
  port_range_end: 7887
keys:
  # Overridden at runtime by LIVEKIT_KEYS env (apikey: *** Keep a sane
  # default so the container starts even if env is missing in dev.
  devkey: devsecret
redis:
  address: redis:6379   # reuse existing redis service for clustering/lock
turn:
  # Coturn runs as a separate container; LiveKit announces it to clients.
  enabled: true
  domain: ${LIVEKIT_TURN_DOMAIN:-turn.hostamar.com}
  tls_port: 5349
  cert_file: /certs/fullchain.pem
  key_file: /certs/privkey.pem
# For single-node $0, SFU only is fine. No egress yet.
