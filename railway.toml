[service.web]
image.source = "nixpacks"
startCommand = "npx prisma migrate deploy && node .next/standalone/server.js"
restartPolicy = "ON_FAILURE"
maxRestarts = 10

[service.web.variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
PORT = "3000"
HOSTNAME = "0.0.0.0"
DATABASE_URL = "postgresql://postgres:***@postgres.railway.internal:5432/railway"
REDIS_URL = "redis://localhost:6379"
NEXTAUTH_SECRET = "***"
NEXTAUTH_URL = "https://web-production-1234d.up.railway.app"
NEXT_PUBLIC_SITE_URL = "https://hostamar.com"
SEARXNG_BASE_URL = "http://flociops-searxng:8080"
