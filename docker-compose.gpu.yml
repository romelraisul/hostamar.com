services:
  gpu-worker:
    build:
      context: .
      dockerfile: Dockerfile.gpu-worker
    container_name: hostamar-gpu-worker
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - FAL_AI_API_KEY=${FAL_AI_API_KEY}
      - WORKER_NAME=hostamar-gpu-worker-local
      - WORKER_CONCURRENCY=2
    volumes:
      - /tmp:/tmp
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:9997/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s