name: AI Code Review Gate

# Static guardrail layer (no LLM tokens required). Blocks confident-but-wrong
# commits before a human reviews. Complements hostamar-ci.yml (the build/test
# pipeline) and requesting-code-review (pre-commit subagent brain).
#
# Grounded to hostamar.com: Node 18, npm ci, `npm run typecheck` / `npm run lint`
# / `npm run build` (reuse the same commands as hostamar-ci.yml).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    name: Static Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install
        run: npm ci

      # 1. Forbidden-file block ------------------------------------------------
      # Blocks the destructive-file class. NOTE: tsconfig.tsbuildinfo is
      # intentionally EXCLUDED here because it is already committed in this repo
      # (legacy). See .github/BRANCH_PROTECTION.md for the deviation.
      - name: Forbidden-file block
        run: |
          set -euo pipefail
          FORBIDDEN=("_reset.ts" "vcheck.sql" "rag_check.sql" "scripts/_reset.ts")
          VIOLATIONS=()
          seen=()
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            base="${f##*/}"
            matched=""
            for bad in "${FORBIDDEN[@]}"; do
              if [ "$f" = "$bad" ] || [ "$base" = "$bad" ]; then
                matched="$f"; break
              fi
            done
            if [ -n "$matched" ]; then
              # dedupe (full-path match and basename match resolve to same file)
              if [[ ! " ${seen[*]} " =~ " ${matched} " ]]; then
                VIOLATIONS+=("$matched"); seen+=("$matched")
              fi
            fi
          done < <(git diff --name-only origin/main...HEAD || git diff --name-only HEAD~1...HEAD || true)
          if [ "${#VIOLATIONS[@]}" -gt 0 ]; then
            echo "::error:: Forbidden file(s) added/modified in this PR:"
            printf '  - %s\n' "${VIOLATIONS[@]}"
            exit 1
          fi
          echo "OK: no forbidden files in diff"

      # 2. Secret-in-client scan ----------------------------------------------
      # Generic guard: no secret/credential token may reach a client component
      # (*.tsx / *.jsx) outside server-only code (route.ts / lib / server).
      # Catches LIVEKIT_*, NEXTAUTH_SECRET, DATABASE_URL, STRIPE_*, *_SECRET,
      # *_API_KEY, PRIVATE_KEY, etc.
      #
      # False-positive exclusions (intentional / safe by design):
      #   - NEXT_PUBLIC_*  : Next.js convention — these ARE meant to be exposed
      #                      to the browser; flagging them is noise.
      #   - app/dev-tools/ : developer documentation/example page (shows env-var
      #                      names as examples, not real values).
      # NOTE: app/setup/page.tsx ships REAL literal secrets (NEXTAUTH_SECRET,
      # QUEUE_SECRET, S3_SECRET_KEY, a Neon DATABASE_URL) in a client component —
      # that is a genuine leak and is intentionally NOT excluded. Fix it in
      # product code, not here.
      - name: Secret-in-client scan
        run: |
          set -euo pipefail
          PATTERN='(LIVEKIT_[A-Z_]+|NEXTAUTH_SECRET|DATABASE_URL|STRIPE_[A-Z_]+|[A-Z_]+_SECRET|[A-Z_]+_API_KEY|[A-Z_]+_PRIVATE_KEY|PRIVATE_KEY)'
          HITS="$(grep -rEn "$PATTERN" --include='*.tsx' --include='*.jsx' app components 2>/dev/null | grep -vE 'route\.tsx?$|/lib/|/server/|server-only|NEXT_PUBLIC_|/dev-tools/' || true)"
          if [ -n "$HITS" ]; then
            echo "::error:: Possible secret/credential reaching client code:"
            echo "$HITS"
            exit 1
          fi
          echo "OK: no secrets in client components"

      # 3. Schema-drift check -------------------------------------------------
      - name: Schema-drift check
        run: node scripts/check-schema-drift.js

      # 4. Gates: tsc / lint / build ------------------------------------------
      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

      # 5. Tenant-isolation grep audit (advisory) -----------------------------
      # Read-only. Surfaces raw prisma access inside API routes for later
      # isolation review. Does not fail the build.
      - name: Tenant-isolation grep audit (advisory)
        run: |
          set -uo pipefail
          echo "### Tenant-isolation audit (advisory)" >> "$GITHUB_STEP_SUMMARY"
          HITS="$(grep -rEn "prisma\.(video|payment|voiceCall|customer|conversation|order|lead)\." app/api 2>/dev/null || true)"
          if [ -n "$HITS" ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$HITS" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No obvious unscoped tenant queries detected." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "OK: advisory audit complete (non-blocking)"

      # 6. PR-size advisory --------------------------------------------------
      # Commonly requested: warn (not fail) on very large PRs so reviewers
      # actually read them. CI stays green; the summary nudges smaller PRs.
      - name: PR-size advisory
        run: |
          set -uo pipefail
          FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null | wc -l || echo 0)
          LOC=$(git diff --stat origin/main...HEAD 2>/dev/null | tail -1 | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          echo "### PR size (advisory)" >> "$GITHUB_STEP_SUMMARY"
          echo "Files changed: $FILES | Lines added: $LOC" >> "$GITHUB_STEP_SUMMARY"
          if [ "${FILES:-0}" -gt 50 ]; then
            echo "⚠️ Large PR ($FILES files). Consider splitting for easier review." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "PR size looks reviewable." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "OK: size advisory complete (non-blocking)"

      # 7. Guard summary -----------------------------------------------------
      - name: Guard summary
        run: |
          set -uo pipefail
          echo "## ✅ AI Code Review — static guardrails passed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Forbidden-file block" >> "$GITHUB_STEP_SUMMARY"
          echo "- Secret-in-client scan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Schema-drift check" >> "$GITHUB_STEP_SUMMARY"
          echo "- tsc / lint / build gates" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tenant-isolation + PR-size advisories" >> "$GITHUB_STEP_SUMMARY"
