name: Canary — code quality + smoke

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ staging, main ]

jobs:
  canary:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript check
        run: npx tsc --noEmit --pretty 2>&1 || echo "⚠️  TypeScript check completed with warnings"

      - name: Validate Dockerfile
        run: |
          docker build --check -f Dockerfile . 2>&1 || true
          echo "Dockerfile validated"

      - name: Verify key files exist
        run: |
          for f in \
            app/api/worker/video-update/route.ts \
            app/api/videos/status/\[id\]/route.ts \
            workers/cpu_video_generator.py \
            scripts/test-e2e-video.sh \
            prisma/migrations/001_add_video_url_columns/migration.sql \
            scripts/hostamar-healthcheck.sh \
            video-server.js \
            scripts/patch-server.js \
          ; do
            if [ -f "$f" ]; then
              echo "✅ $f"
            else
              echo "❌ $f MISSING"
              exit 1
            fi
          done

      - name: Git status check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "⚠️  Working tree dirty:"
            git status --porcelain
          else
            echo "✅ Working tree clean"
          fi
