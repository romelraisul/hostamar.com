name: Backup

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  backup-database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backup PostgreSQL database
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            BACKUP_DIR="/opt/hostamar/backups"
            mkdir -p "$BACKUP_DIR"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            pg_dump -U postgres hostamar > "$BACKUP_DIR/hostamar_$TIMESTAMP.sql"
            gzip "$BACKUP_DIR/hostamar_$TIMESTAMP.sql"
            find "$BACKUP_DIR" -name "*.sql.gz" -mtime +30 -delete
            echo "Database backup completed: hostamar_$TIMESTAMP.sql.gz"

  backup-uploads:
    runs-on: ubuntu-latest
    needs: backup-database
    steps:
      - name: Backup uploaded files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            BACKUP_DIR="/opt/hostamar/backups"
            mkdir -p "$BACKUP_DIR"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            tar -czf "$BACKUP_DIR/uploads_$TIMESTAMP.tar.gz" -C /opt/hostamar public/uploads 2>/dev/null || echo "No uploads directory found"
            find "$BACKUP_DIR" -name "uploads_*.tar.gz" -mtime +30 -delete
            echo "Uploads backup completed: uploads_$TIMESTAMP.tar.gz"

  backup-config:
    runs-on: ubuntu-latest
    needs: backup-database
    steps:
      - name: Backup configuration files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            BACKUP_DIR="/opt/hostamar/backups"
            mkdir -p "$BACKUP_DIR"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            tar -czf "$BACKUP_DIR/config_$TIMESTAMP.tar.gz" \
              /opt/hostamar/.env \
              /opt/hostamar/docker-compose.yml \
              /opt/hostamar/nginx.conf 2>/dev/null || echo "Some config files not found"
            echo "Config backup completed: config_$TIMESTAMP.tar.gz"

  notify:
    runs-on: ubuntu-latest
    needs: [backup-database, backup-uploads, backup-config]
    if: always()
    steps:
      - name: Backup summary
        run: |
          echo "Weekly backup completed"
          echo "Database: ${{ needs.backup-database.result }}"
          echo "Uploads: ${{ needs.backup-uploads.result }}"
          echo "Config: ${{ needs.backup-config.result }}"
