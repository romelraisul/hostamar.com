  post-deploy-verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: [deploy-db, deploy-grafana]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to settle..."
          sleep 30

      - name: Run verification script
        shell: pwsh
        run: |
          ./scripts/post-deploy-verify.ps1 `
            -BaseUrl "${{ secrets.PROD_BASE_URL }}" `
            -AdminEmail "admin@hostamar.com" `
            -AdminPassword "${{ secrets.ADMIN_PASSWORD }}" `
            -ReportFile "reports/post-deploy-report.json"
        env:
          PGPASSWORD: ${{ secrets.CI_DB_PASSWORD || 'hostamar123' }}

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-report-${{ github.run_id }}
          path: reports/post-deploy-report.json

      - name: Report results
        run: |
          $report = Get-Content reports/post-deploy-report.json | ConvertFrom-Json
          echo "## ✅ Post-Deploy Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status | Time |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|------|" >> $GITHUB_STEP_SUMMARY
          $report.results | ForEach-Object {
            $icon = if ($_.status -eq 'pass') { '✅' } else { '❌' }
            echo "| $icon $($_.name) | $($_.status) | $($_.time.ToString('0.0'))s |" >> $GITHUB_STEP_SUMMARY
          }
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Result:** $(if ($report.allPassed) { '✅ ALL PASSED' } else { "❌ $($report.failedChecks) FAILED" })" >> $GITHUB_STEP_SUMMARY

          if (-not $report.allPassed) {
            Write-Host "❌ Verification failed" -ForegroundColor Red
            exit 1
          }
        shell: pwsh

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "channel": "#hostamar-alerts",
              "text": "❌ Post-deploy verification FAILED for ${{ github.repository }}@${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [rotate-secrets, lint-typecheck, unit-tests, integration-tests, post-deploy-verify, deploy-grafana, deploy-db]
    if: always()
    steps:
      - run: |
          echo "## ✅ Hostamar CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Rotation | ${{ needs.rotate-secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & TypeCheck | ${{ needs.lint-typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Post-Deploy Verify | ${{ needs.post-deploy-verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana Import | ${{ needs.deploy-grafana.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DB Migration | ${{ needs.deploy-db.result }} |" >> $GITHUB_STEP_SUMMARY
