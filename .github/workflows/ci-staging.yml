name: CI Staging — E2E pipeline

on:
  push:
    branches: [ staging ]
  workflow_dispatch:

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Validate Dockerfile
        run: docker build --check -f Dockerfile . 2>&1 || true

      - name: Check key scripts are present
        run: |
          test -f scripts/test-e2e-video.sh && echo "E2E test present"
          test -f scripts/hostamar-healthcheck.sh && echo "Healthcheck present"
          test -f prisma/migrations/001_add_video_url_columns/migration.sql && echo "Migration present"

      - name: Dry-run migration
        run: |
          echo "To apply on production:"
          echo "  psql \$DATABASE_URL -f prisma/migrations/001_add_video_url_columns/migration.sql"
          echo "Migration file validated (no-op if columns exist)"
