name: CI Staging — migration + E2E

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging, main ]

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: /home/romel/hostamar.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start test services (Redis + Postgres)
        run: |
          docker compose -f docker-compose.test.yml up -d redis postgres
          sleep 5
          echo "Services ready"

      - name: Apply DB migration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
        run: |
          psql "$DATABASE_URL" -f prisma/migrations/001_add_video_url_columns/migration.sql
          echo "Migration applied (no-op if columns exist)"

      - name: Build app container
        run: |
          docker build -t hostamar-app-test -f Dockerfile .
          docker run -d --name hostamar-app-test \
            -p 3000:3000 \
            -e DATABASE_URL="$DATABASE_URL" \
            -e WORKER_SHARED_SECRET="$WORKER_SHARED_SECRET" \
            hostamar-app-test
          sleep 8
          curl -fsS http://localhost:3000/api/health
          echo "App ready"

      - name: Run E2E test
        env:
          VIDEO_ID: "ci-test-${{ github.sha }}"
        run: |
          bash scripts/test-e2e-video.sh
          echo "E2E completed"

      - name: Cleanup
        if: always()
        run: |
          docker stop hostamar-app-test 2>/dev/null || true
          docker rm hostamar-app-test 2>/dev/null || true
