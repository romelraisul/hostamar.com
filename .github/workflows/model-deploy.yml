name: CI Deploy Model

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip home server deployment'
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./model-server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hostamar-model:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/hostamar-model:canary

  deploy-to-home:
    needs: build-and-push
    if: ${{ inputs.skip_deploy != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
      - name: Connect to Tailnet
        run: |
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname gh-runner-hostamar
      - name: SSH deploy to home server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOME_HOST_SSH }}
          port: ${{ secrets.HOME_SSH_PORT || '22' }}
          username: ${{ secrets.HOME_USER }}
          key: ${{ secrets.HOME_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/hostamar-model:canary
            docker pull ghcr.io/${{ github.repository_owner }}/hostamar-model:stable
            cd /home/${{ secrets.HOME_USER }}/hostamar
            docker compose pull
            docker compose up -d