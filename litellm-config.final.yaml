# litellm-config.final.yaml — permanent Hostamar router config.
# Generated by guard-restore. Safe to keep under git (no secrets).
# Secret loading: read from env when starting container (see permanent.sh).

model_list:
  # PRIMARY: local Ollama fallback. Always on, never 429s.
  - model_name: hostamar-own            # main chat / reasoning
    litellm_params:
      model: ollama/gema4:12b
      api_base: http://host.docker.internal:11434
      timeout: 1800
      max_retries: 4
      retry_after: 5
  - model_name: hostamar-own-fast       # edge
    litellm_params:
      model: ollama/gema4:4b
      api_base: http://host.docker.internal:11434
      timeout: 1200
  - model_name: hostamar-own-coder      # local coder
    litellm_params:
      model: ollama/gema4-code:12b
      api_base: http://host.docker.internal:11434
      alias: gemma4-12b-code
      timeout: 1800

  # NVIDIA NIM free-tier (cloud, 1M tok/month). Token-guarded.
  - model_name: glm-5.2
    litellm_params:
      model: openai/z-ai/glm-5.2
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      timeout: 300
      max_retries: 0    # let the token guard be the only retry source
  - model_name: minimax-m3
    litellm_params:
      model: openai/minimaxai/minimax-m3
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      timeout: 300
      max_retries: 0

  # KiloCode gateway. Token-guarded. Secret via env.
  - model_name: kilocode-fast
    litellm_params:
      model: openai/kilo-fast
      api_base: os.environ/KILOCODE_BASE_URL
      api_key: os.environ/KILOCODE_API_KEY
      timeout: 240
      max_retries: 0

# Fallback chain: local first (always), then cloud.
router_settings:
  routing_strategy: usage-based-routing
  num_retries: 2
  retry_after: 5
  fallbacks:
    - glm-5.2: ["hostamar-own"]
    - minimax-m3: ["hostamar-own"]
    - kilocode-fast: ["hostamar-own-coder", "hostamar-own"]
  context_window_fallbacks:
    - glm-5.2: ["hostamar-own"]

# LiteLLM server-level config.
general_settings:
  master_key: sk-hostamar-router
  disable_spend_logs: true
  disable_reset_budget: false
  telemetry: false
  # No database_url here — LiteLLM should not try to use a DB at all.
  # disable_jwt_auth and friends stop it loading the DB layer.
  ui: false
  disable_end_user_auth: true
litellm_settings:
  drop_params: true
  request_timeout: 600
  num_threads: 8
  set_verbose: false
  # Token guard is wired via guard_callback.py self-registering on import
  # (see guard/entrypoint-litellm.sh). No `callbacks:` key needed here.

# Token guard config (read by guard_callback.GuardCallback on init)
hostamar_guard:
  enabled: true
  per_sec: 8
  per_min: 2000
  per_day: 400000
  providers:
    nvidia: { base: https://integrate.api.nvidia.com/v1,   model_prefix: openai/ }
    kilocode: { base: os.environ/KILOCODE_BASE_URL,         model_prefix: openai/ }
  db_path: /tmp/guard_history.db
  archive_path: /tmp/guard_archive.jsonl

