# =============================================================================
# Hostamar — Production Docker Compose Stack
# =============================================================================
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Redis 7 — BullMQ job queue backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hostamar-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — primary database (Neon in prod, local for dev/test)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: hostamar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hostamar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hostamar}
      POSTGRES_DB: ${POSTGRES_DB:-hostamar}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hostamar}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Next.js App (API server + frontend)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hostamar-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_BUCKET=${R2_BUCKET:-hostamar-videos}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - REPLICATE_API_KEY=${REPLICATE_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}
      - NEXT_PUBLIC_POSTHOG_KEY=${NEXT_PUBLIC_POSTHOG_KEY}
      - NEXT_PUBLIC_POSTHOG_HOST=${NEXT_PUBLIC_POSTHOG_HOST}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://hostamar-ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-hermes3:latest}
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # BullMQ Worker — video generation (runs alongside the app)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hostamar-worker
    command: ["node", "dist/workers/video-generation.js"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_BUCKET=${R2_BUCKET:-hostamar-videos}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - REPLICATE_API_KEY=${REPLICATE_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://hostamar-ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-hermes3:latest}
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Ollama — local Docker Model Runner for AI inference
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: hostamar-ollama
    ports:
      - "127.0.0.1:11434:11434"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - hostamar-network
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_QUEUE=512
      - OLLAMA_NOHISTORY=false
      - OLLAMA_KEEP_ALIVE=5m0s
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

# ---------------------------------------------------------------------------
# Named Volumes
# ---------------------------------------------------------------------------
volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  ollama-data:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  hostamar-network:
    external: true
    name: flociops-assistant_hostamar-network
