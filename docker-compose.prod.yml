# Production override: self-hosted LiveKit SFU + Coturn TURN on the existing
# $0 VPS stack (reuses hostamar-network, redis). No LiveKit Cloud bill.
# Bring up with:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d livekit coturn
# (or just `docker compose up -d` — it merges with the base file.)
services:
  livekit:
    image: livekit/livekit-server:v1.8.4
    container_name: hostamar-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"      # signaling HTTP + WS
      - "7881:7881"      # RTC TCP fallback
      - "7882-7887:7882-7887/udp"  # RTC UDP media — open these in firewall
      - "7882-7887:7882-7887/tcp"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      LIVEKIT_NODE_IP: "${VPS_PUBLIC_IP}"       # export VPS_PUBLIC_IP=$(curl -s ifconfig.me) before up
      LIVEKIT_RTC_USE_EXTERNAL_IP: "true"
      LIVEKIT_INTERNAL_URL: "${LIVEKIT_INTERNAL_URL:-ws://livekit:7880}"
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
    networks:
      - hostamar-network

  coturn:
    image: coturn/coturn:4.6.2
    container_name: hostamar-coturn
    restart: unless-stopped
    network_mode: host   # required for the UDP relay to bind correctly
    command: -c /etc/coturn/turnserver.conf
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    environment:
      - TURN_USER=hostamar:${COTURN_PASSWORD}
    depends_on:
      - livekit

# Reuse the base file's networks/volumes (hostamar-network is external).
networks:
  hostamar-network:
    external: true
    name: hostamar-network
